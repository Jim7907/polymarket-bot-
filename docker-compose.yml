version: "3.9"
services:
  bot:
    build: .
    image: polymarket-weather-bot:latest
    container_name: polymarket-bot
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - POLY_API_KEY=${POLY_API_KEY:-}
      - POLY_SECRET=${POLY_SECRET:-}
      - POLY_PASSPHRASE=${POLY_PASSPHRASE:-}
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
